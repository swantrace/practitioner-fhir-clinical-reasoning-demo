app = "practitioner-ui"
primary_region = "yyz"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  CDS_USER_ID = "Practitioner/demo"
  HAPI_PLAN_DEFINITION_ID = "hypertension-bp-followup"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]
