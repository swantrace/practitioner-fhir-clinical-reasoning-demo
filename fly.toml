# fly.toml app configuration file generated for practitioner-ui on 2026-07-15T16:58:07-06:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'practitioner-ui'
primary_region = 'yyz'

[build]
  dockerfile = 'Dockerfile'

[env]
  CDS_SERVICE_BASE_URL = 'http://127.0.0.1:8080/'
  CDS_USER_ID = 'Practitioner/demo'
  FHIR_BASE_URL = 'http://practitioner-hapi-fhir.internal:8080/fhir/'
  HAPI_PLAN_DEFINITION_ID = 'hypertension-bp-followup'
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
